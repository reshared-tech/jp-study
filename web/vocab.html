<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>背单词 · 识日风</title>
<style>
  :root{
    --bg:#0f1419; --panel:#161b22; --panel2:#1c232c; --border:#2a313c;
    --text:#e6edf3; --muted:#8b98a5; --accent:#4cc2ff; --accent2:#7ee787;
    --jp:#ffd479; --play:#2ea043;
    --know:#2ea043; --vague:#d29922; --dont:#f0576a;
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,"PingFang SC","Hiragino Sans",system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%,#182029,var(--bg));
    color:var(--text); min-height:100vh;
  }
  button{font-family:inherit}
  .wrap{max-width:860px; margin:0 auto; padding:22px 20px 90px}

  /* top bar */
  header.top{display:flex; align-items:center; gap:14px; margin-bottom:22px; flex-wrap:wrap}
  header.top h1{font-size:18px; margin:0; letter-spacing:.5px}
  header.top .sub{font-size:12px; color:var(--muted)}
  .grow{flex:1}
  .chip{background:var(--panel); border:1px solid var(--border); color:var(--text);
    padding:7px 13px; border-radius:20px; cursor:pointer; font-size:13px; display:inline-flex; align-items:center; gap:6px}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--jp); color:#1a1205; border-color:var(--jp); font-weight:600}
  a.chip{text-decoration:none}

  /* daily ring */
  .daily{display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--border);
    padding:6px 14px 6px 8px; border-radius:22px}
  .ring{width:34px; height:34px}
  .daily .d-txt{font-size:12px; line-height:1.3}
  .daily .d-txt b{font-size:14px; color:var(--accent2)}

  /* home */
  .hero{display:grid; grid-template-columns:1fr; gap:14px; margin-bottom:26px}
  .review-card{background:linear-gradient(135deg,#12303f,#132132); border:1px solid #24506b;
    border-radius:var(--radius); padding:20px 22px; display:flex; align-items:center; gap:18px; cursor:pointer;
    transition:transform .12s, border-color .12s}
  .review-card:hover{transform:translateY(-2px); border-color:var(--accent)}
  .review-card .big{font-size:38px; font-weight:700; color:var(--accent); min-width:64px; text-align:center}
  .review-card .t1{font-size:16px; font-weight:600}
  .review-card .t2{font-size:12px; color:var(--muted); margin-top:3px}
  .review-card .go{margin-left:auto; font-size:22px; color:var(--accent)}
  .review-card.empty{background:var(--panel); border-color:var(--border); cursor:default}
  .review-card.empty:hover{transform:none; border-color:var(--border)}
  .review-card.empty .big{color:var(--muted)}

  .lvl-sec{margin-top:8px}
  .lvl-title{font-size:13px; color:var(--muted); margin:20px 0 10px; letter-spacing:1px; display:flex; align-items:center; gap:8px}
  .lvl-title::after{content:""; flex:1; height:1px; background:var(--border)}
  .deck-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px}
  .deck{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:13px 14px;
    cursor:pointer; text-align:left; transition:border-color .12s, background .12s; position:relative; overflow:hidden}
  .deck:hover{border-color:var(--accent); background:var(--panel2)}
  .deck .dk-name{font-size:14px; margin-bottom:8px; line-height:1.35}
  .deck .dk-meta{font-size:11px; color:var(--muted); display:flex; justify-content:space-between; align-items:center}
  .deck .dk-due{color:var(--jp)}
  .deck .bar{position:absolute; left:0; bottom:0; height:3px; background:var(--accent2); transition:width .3s}
  .deck.done .dk-name{color:var(--muted)}

  /* study */
  #study{display:none}
  .st-top{display:flex; align-items:center; gap:12px; margin-bottom:16px; font-size:12px; color:var(--muted)}
  .st-top .prog{font-weight:600; color:var(--text)}
  .pbar{flex:1; height:6px; background:var(--panel2); border-radius:3px; overflow:hidden; max-width:340px}
  .pbar > i{display:block; height:100%; background:var(--accent); width:0; transition:width .3s}

  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:22px;
    padding:40px 26px; min-height:340px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; position:relative; cursor:pointer;
    user-select:none;
  }
  .card .cat{position:absolute; top:16px; left:20px; font-size:12px; color:var(--accent2)}
  .card .mstars{position:absolute; top:16px; right:20px; font-size:12px; color:var(--jp); letter-spacing:1px}
  .front-main{font-size:52px; line-height:1.25; color:var(--jp)}
  .front-main.cn{color:#e6edf3; font-size:34px}
  .front-hint{font-size:13px; color:var(--muted); margin-top:22px}

  .back{margin-top:6px; width:100%; display:none; animation:fade .18s ease}
  .reveal .back{display:block}
  .reveal .front-hint{display:none}
  @keyframes fade{from{opacity:0; transform:translateY(6px)}to{opacity:1;transform:none}}
  .back .kana{font-size:19px; color:var(--muted); margin-top:10px}
  .back .cn{font-size:24px; color:#e6edf3; margin-top:14px}
  .back .jp-reveal{font-size:40px; color:var(--jp); margin-top:8px; line-height:1.3}
  .back .ex{font-size:14px; color:var(--muted); margin-top:18px; line-height:1.6; max-width:520px; margin-left:auto; margin-right:auto}
  .back .ledger-tag{display:inline-block; margin-top:14px; font-size:11px; color:var(--accent);
    border:1px solid #24506b; background:#12232f; border-radius:12px; padding:3px 10px}

  .audio-btn{margin-top:20px; width:52px; height:52px; border-radius:50%; border:none; background:var(--play);
    color:#fff; font-size:20px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center}
  .audio-btn:hover{filter:brightness(1.15)}
  .audio-btn.small{width:40px;height:40px;font-size:16px}

  .grade{display:none; gap:12px; margin-top:22px; justify-content:center}
  .reveal ~ .grade, .grade.show{display:flex}
  .g-btn{flex:1; max-width:180px; border:none; border-radius:14px; padding:15px 10px; cursor:pointer;
    font-size:15px; font-weight:600; color:#04121f; display:flex; flex-direction:column; align-items:center; gap:3px}
  .g-btn .k{font-size:11px; font-weight:500; opacity:.7}
  .g-dont{background:var(--dont); color:#fff}
  .g-vague{background:var(--vague)}
  .g-know{background:var(--know); color:#fff}
  .g-btn:hover{filter:brightness(1.1)}

  .reveal-hint{text-align:center; margin-top:22px; color:var(--muted); font-size:13px}

  .done-screen{text-align:center; padding:60px 20px}
  .done-screen .em{font-size:56px}
  .done-screen h2{margin:14px 0 6px}
  .done-screen p{color:var(--muted); font-size:14px}

  .kbd{background:var(--panel2); border:1px solid var(--border); border-radius:5px; padding:1px 6px; font-size:11px; color:var(--muted)}
  .footer-note{margin-top:34px; font-size:12px; color:var(--muted); text-align:center; line-height:1.8}
  .footer-note a{color:var(--accent); cursor:pointer}
  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:var(--panel2);
    border:1px solid var(--border); padding:10px 18px; border-radius:10px; font-size:13px; opacity:0;
    transition:opacity .2s; pointer-events:none; z-index:50}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>📖 背单词 <span class="sub">识日风</span></h1>
    </div>
    <div class="grow"></div>
    <button class="chip" id="dirBtn" title="切换认词方向">🀄 日→中</button>
    <a class="chip" href="index.html">📓 日志/抽认</a>
    <div class="daily" title="今日已学（新学+复习）">
      <svg class="ring" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="15.5" fill="none" stroke="#2a313c" stroke-width="4"/>
        <circle id="ringFg" cx="18" cy="18" r="15.5" fill="none" stroke="#7ee787" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="97.4" stroke-dashoffset="97.4" transform="rotate(-90 18 18)"/>
      </svg>
      <div class="d-txt"><b id="dailyNum">0</b>/<span id="dailyGoal">20</span><br>今日</div>
    </div>
  </header>

  <!-- HOME -->
  <div id="home"></div>

  <!-- STUDY -->
  <div id="study">
    <div class="st-top">
      <span class="prog" id="stProg">1 / 1</span>
      <div class="pbar"><i id="stBar"></i></div>
      <span id="stTitle"></span>
      <div class="grow"></div>
      <button class="chip" id="dirBtn2">🀄 日→中</button>
      <button class="chip" id="quitBtn">✕ 结束</button>
    </div>
    <div id="cardHost"></div>
  </div>

  <div class="footer-note" id="homeFoot"></div>
</div>
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="ledger.js"></script>
<script>
/* ============================================================
   识日风 背单词 —— 复用 web/data.js 的牌组 + 读 ledger.js 的 SRS 状态
   进度存 localStorage；导出可用 tools/sync_vocab_progress.py 写回 ledger.json
   ============================================================ */
const LS_PROG  = 'shiri.prog.v1';   // { cardId: {m,due,last,seen,jp} }
const LS_DAILY = 'shiri.daily.v1';  // { date, count }
const LS_DIR   = 'shiri.dir.v1';    // 'jp2cn' | 'cn2jp'
const LS_GOAL  = 'shiri.goal.v1';   // number

const INTERVALS = (window.LEDGER_DATA?.meta?.srs_intervals_days) || [1,1,3,7,16,35];

// ---------- 日期工具（本地日） ----------
const pad=n=>String(n).padStart(2,'0');
function today(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function addDays(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function dueSoon(iso){return !iso || iso<=today();}

// ---------- 存储 ----------
const load=(k,def)=>{try{return JSON.parse(localStorage.getItem(k))??def;}catch{return def;}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let PROG  = load(LS_PROG,{});
let DAILY = load(LS_DAILY,{date:today(),count:0});
let DIR   = localStorage.getItem(LS_DIR) || 'jp2cn';
let GOAL  = load(LS_GOAL,20);
if(DAILY.date!==today()){DAILY={date:today(),count:0};save(LS_DAILY,DAILY);}

// ---------- 从 data.js 抽出牌组与卡片 ----------
const DECKS=[]; const CARD_BY_ID={};
(window.STUDY_DATA?.days||[]).forEach(d=>{
  if(d.kind!=='vocab' && d.kind!=='basic') return;
  const cards=(d.sentences||[]).map(c=>{
    const id=`${d.slug}#${c.n}`;
    const card={id, deck:d.slug, level:d.level||'基础', title:d.date,
      jp:c.jp, kana:c.kana||'', cn:c.cn||'', ex:c.ex||'', cat:c.cat||d.date,
      audio:(c.audio&&!c.noaudio)?c.audio:''};
    CARD_BY_ID[id]=card; return card;
  });
  DECKS.push({slug:d.slug, level:d.level||'基础', title:d.date, kind:d.kind, cards});
});

// ---------- ledger 播种：按 jp 文本把已有 mastery 认领过来（只认领一次） ----------
const LEDGER_BY_JP={};
(window.LEDGER_DATA?.items||[]).forEach(it=>{ if(it.jp) LEDGER_BY_JP[it.jp]=it; });
let seeded=false;
Object.values(CARD_BY_ID).forEach(card=>{
  if(PROG[card.id]) return;              // 已有本地进度，不覆盖
  const led=LEDGER_BY_JP[card.jp];
  if(led && (led.mastery>0 || led.due)){
    PROG[card.id]={m:led.mastery||0, due:led.due||today(), last:led.last_seen||'', seen:led.exposures||0, jp:card.jp, fromLedger:true};
    seeded=true;
  }
});
if(seeded) save(LS_PROG,PROG);

// ---------- SRS ----------
function grade(card,res){
  const st=PROG[card.id]||{m:0,seen:0,jp:card.jp};
  st.seen=(st.seen||0)+1;
  if(res==='know')      st.m=Math.min(5,(st.m||0)+1);
  else if(res==='vague')st.m=Math.max(0,(st.m||0));       // 维持
  else                  st.m=Math.max(0,(st.m||0)-2);     // 不认识：回炉
  st.last=today();
  st.due=addDays(today(), INTERVALS[st.m] ?? 1);
  st.jp=card.jp; delete st.fromLedger;
  PROG[card.id]=st; save(LS_PROG,PROG);
  DAILY.count++; save(LS_DAILY,DAILY);
  renderDaily();
}

// ---------- 队列 ----------
function dueQueue(){ // 所有到期的（学过的）卡
  return Object.keys(PROG)
    .filter(id=>CARD_BY_ID[id] && dueSoon(PROG[id].due))
    .map(id=>CARD_BY_ID[id])
    .sort((a,b)=>(PROG[a.id].due||'').localeCompare(PROG[b.id].due||''));
}
function deckQueue(slug,forceAll){
  const dk=DECKS.find(d=>d.slug===slug); if(!dk) return [];
  if(forceAll) return dk.cards.slice();
  return dk.cards.filter(c=>{const st=PROG[c.id]; return !st || dueSoon(st.due);});
}
function deckStat(dk){
  let learned=0,due=0;
  dk.cards.forEach(c=>{const st=PROG[c.id]; if(st){learned++; if(dueSoon(st.due))due++;}});
  return {learned,due,total:dk.cards.length};
}

// ---------- 发音：有 mp3 播文件，否则用浏览器日语语音合成念假名 ----------
let jaVoice=null;
function pickVoice(){const vs=speechSynthesis.getVoices();
  jaVoice=vs.find(v=>/ja[-_]JP/i.test(v.lang))||vs.find(v=>/ja/i.test(v.lang))||null;}
if('speechSynthesis' in window){pickVoice(); speechSynthesis.onvoiceschanged=pickVoice;}
let audioEl=null;
function speak(card){
  const file=card.audio;
  if(file){
    if(audioEl){audioEl.pause();}
    audioEl=new Audio(file);
    audioEl.play().catch(()=>ttsFallback(card));
    return;
  }
  ttsFallback(card);
}
function ttsFallback(card){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(card.kana||card.jp);
  u.lang='ja-JP'; u.rate=.85; if(jaVoice)u.voice=jaVoice;
  speechSynthesis.speak(u);
}

/* ================= 渲染 ================= */
const $=s=>document.querySelector(s);
const homeEl=$('#home'), studyEl=$('#study'), cardHost=$('#cardHost');

function dirLabel(){return DIR==='jp2cn'?'🀄 日→中':'✍️ 中→日';}
function renderDaily(){
  $('#dailyNum').textContent=DAILY.count;
  $('#dailyGoal').textContent=GOAL;
  const r=15.5, C=2*Math.PI*r;
  const frac=Math.min(1,DAILY.count/GOAL);
  const fg=$('#ringFg'); fg.setAttribute('stroke-dasharray',C.toFixed(1));
  fg.setAttribute('stroke-dashoffset',(C*(1-frac)).toFixed(1));
}
function setDirButtons(){document.querySelectorAll('#dirBtn,#dirBtn2').forEach(b=>b.textContent=dirLabel());}

function renderHome(){
  studyEl.style.display='none'; homeEl.style.display='block';
  const dq=dueQueue();
  const levels=['基础','N5','N4'];
  let html='';
  // 复习卡
  if(dq.length){
    html+=`<div class="hero"><div class="review-card" onclick="startQueue(dueQueue(),'📅 今日复习')">
      <div class="big">${dq.length}</div>
      <div><div class="t1">今日复习</div><div class="t2">到期该复现的词，按间隔重复安排</div></div>
      <div class="go">▶</div></div></div>`;
  }else{
    html+=`<div class="hero"><div class="review-card empty">
      <div class="big">✓</div>
      <div><div class="t1">今日复习已清空</div><div class="t2">选个牌组学新词吧</div></div></div></div>`;
  }
  // 牌组
  levels.forEach(lv=>{
    const decks=DECKS.filter(d=>d.level===lv);
    if(!decks.length) return;
    html+=`<div class="lvl-sec"><div class="lvl-title">${lv==='基础'?'🔢 基础':lv}</div><div class="deck-grid">`;
    decks.forEach(dk=>{
      const s=deckStat(dk);
      const pct=Math.round(s.learned/s.total*100);
      const done=s.learned===s.total && s.due===0;
      html+=`<button class="deck ${done?'done':''}" onclick="openDeck('${dk.slug}')">
        <div class="dk-name">${dk.title}</div>
        <div class="dk-meta"><span>${s.learned}/${s.total}${done?' ✓':''}</span>
        <span class="dk-due">${s.due?('复习'+s.due):(s.learned<s.total?'新'+(s.total-s.learned):'')}</span></div>
        <i class="bar" style="width:${pct}%"></i></button>`;
    });
    html+=`</div></div>`;
  });
  homeEl.innerHTML=html;
  renderDaily();
  $('#homeFoot').innerHTML=
    `<span class="kbd">空格</span> 翻面 · <span class="kbd">1</span>/<span class="kbd">2</span>/<span class="kbd">3</span> 不认识/模糊/认识 · <span class="kbd">R</span> 发音 · <span class="kbd">Esc</span> 退出<br>`+
    `进度存在本浏览器。<a onclick="exportProgress()">⬇ 导出进度</a>（用 <code>tools/sync_vocab_progress.py</code> 写回 ledger.json）· `+
    `<a onclick="setGoal()">设每日目标</a> · <a onclick="resetToday()">清零今日计数</a>`;
}

function openDeck(slug){
  const q=deckQueue(slug,false);
  const dk=DECKS.find(d=>d.slug===slug);
  if(!q.length){
    if(confirm(`「${dk.title}」今天没有要学的了 🎉\n要把整组 ${dk.cards.length} 张全部重新过一遍吗？`))
      startQueue(deckQueue(slug,true), dk.title);
    return;
  }
  startQueue(q, dk.title);
}

/* ---------- 学习流程 ---------- */
let QUEUE=[], QI=0, QTITLE='', revealed=false;
function startQueue(q,title){
  if(!q.length){toast('没有卡片');return;}
  QUEUE=q; QI=0; QTITLE=title; revealed=false;
  homeEl.style.display='none'; studyEl.style.display='block';
  $('#stTitle').textContent=title;
  renderCard();
}
function renderCard(){
  if(QI>=QUEUE.length){ renderDone(); return; }
  const card=QUEUE[QI];
  const st=PROG[card.id];
  const stars=st?('★'.repeat(st.m)+'☆'.repeat(5-st.m)):'☆☆☆☆☆';
  $('#stProg').textContent=`${QI+1} / ${QUEUE.length}`;
  $('#stBar').style.width=`${QI/QUEUE.length*100}%`;

  const jp2cn = DIR==='jp2cn';
  const frontMain = jp2cn ? card.jp : card.cn;
  const back = `
    <div class="back">
      ${jp2cn ? `
        <div class="kana">${card.kana||''}</div>
        <div class="cn">${card.cn||''}</div>` : `
        <div class="jp-reveal">${card.jp}</div>
        <div class="kana">${card.kana||''}</div>`}
      ${card.ex?`<div class="ex">${card.ex}</div>`:''}
      <div><button class="audio-btn small" onclick="event.stopPropagation();speak(QUEUE[QI])">🔊</button></div>
      ${st?.fromLedger?`<div class="ledger-tag">↩ 来自陪聊账本 · 已掌握度 ${st.m}</div>`:''}
    </div>`;

  cardHost.innerHTML=`
    <div class="card" id="theCard" onclick="onCardClick()">
      <div class="cat">${card.cat||''}</div>
      <div class="mstars">${stars}</div>
      <div class="front-main ${jp2cn?'':'cn'}">${frontMain}</div>
      ${jp2cn?`<button class="audio-btn" onclick="event.stopPropagation();speak(QUEUE[QI])">🔊</button>`:''}
      <div class="front-hint">${jp2cn?'想一下意思':'想一下怎么用日语说'} · 点卡片或按 <span class="kbd">空格</span> 翻面</div>
      ${back}
    </div>
    <div class="grade" id="gradeRow">
      <button class="g-btn g-dont"  onclick="doGrade('dont')">不认识<span class="k">1</span></button>
      <button class="g-btn g-vague" onclick="doGrade('vague')">模糊<span class="k">2</span></button>
      <button class="g-btn g-know"  onclick="doGrade('know')">认识<span class="k">3</span></button>
    </div>`;
  revealed=false;
  // 认词方向朝「中→日」时，正面不自动发音；朝「日→中」自动读一遍
  if(jp2cn){ setTimeout(()=>speak(card),120); }
}
function onCardClick(){ if(!revealed) reveal(); }
function reveal(){
  revealed=true;
  $('#theCard').classList.add('reveal');
  $('#gradeRow').classList.add('show');
  if(DIR==='cn2jp') speak(QUEUE[QI]);   // 中→日：翻面时才给读音
}
function doGrade(res){
  if(!revealed){reveal();return;}
  grade(QUEUE[QI],res);
  QI++; renderCard();
}
function renderDone(){
  $('#stBar').style.width='100%';
  const dq=dueQueue().length;
  cardHost.innerHTML=`<div class="done-screen">
    <div class="em">🎉</div>
    <h2>这一组过完了</h2>
    <p>今日已学 ${DAILY.count} 张 · 剩余到期复习 ${dq} 张</p>
    <div style="margin-top:22px; display:flex; gap:12px; justify-content:center">
      ${dq?`<button class="chip on" onclick="startQueue(dueQueue(),'📅 今日复习')">继续复习 ${dq} 张</button>`:''}
      <button class="chip" onclick="renderHome()">返回首页</button>
    </div></div>`;
}

/* ---------- 工具菜单 ---------- */
function exportProgress(){
  const out={exported:today(), intervals:INTERVALS, items:{}};
  Object.keys(PROG).forEach(id=>{const c=CARD_BY_ID[id]; if(!c)return;
    const st=PROG[id];
    out.items[id]={jp:c.jp,kana:c.kana,cn:c.cn,level:c.level,deck:c.deck,
      mastery:st.m, due:st.due, last:st.last, seen:st.seen};});
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`vocab-progress-${today()}.json`; a.click();
  toast('已导出，放到仓库根目录后跑 sync 脚本');
}
function setGoal(){const v=parseInt(prompt('每日目标（张）',GOAL)); if(v>0){GOAL=v;save(LS_GOAL,GOAL);renderDaily();}}
function resetToday(){DAILY={date:today(),count:0};save(LS_DAILY,DAILY);renderDaily();toast('今日计数已清零');}
function toggleDir(){DIR=DIR==='jp2cn'?'cn2jp':'jp2cn'; localStorage.setItem(LS_DIR,DIR); setDirButtons();
  if(studyEl.style.display==='block' && QI<QUEUE.length) renderCard(); else renderHome();}

/* ---------- 事件 ---------- */
document.querySelectorAll('#dirBtn,#dirBtn2').forEach(b=>b.onclick=toggleDir);
$('#quitBtn').onclick=renderHome;
let toastT;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}
document.addEventListener('keydown',e=>{
  if(studyEl.style.display!=='block') return;
  if(e.key===' '){e.preventDefault(); if(!revealed)reveal(); return;}
  if(e.key==='Escape'){renderHome();return;}
  if(e.key.toLowerCase()==='r'){if(QI<QUEUE.length)speak(QUEUE[QI]);return;}
  if(!revealed) return;
  if(e.key==='1')doGrade('dont');
  else if(e.key==='2')doGrade('vague');
  else if(e.key==='3')doGrade('know');
});

setDirButtons();
renderHome();
</script>
